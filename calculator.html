<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Currency Exchange</title>
<link rel="stylesheet" href="calculator .css">
</head>

<body>

<div class="container">
    <div class="header">
        <h1>XYZ-COMPANY</h1>
        <p>CURRENCY EXCHANGE PLATFORM</p>
    </div>

    <div class="content">

        <div class="form">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="amount" value="100">
            </div>

            <div class="input-group">
                <label>From</label>
                <select id="from">
                    <option value="USD">USD - $</option>
                    <option value="EUR">EUR - €</option>
                </select>
            </div>

            <div class="input-group">
                <label>To</label>
                <select id="to">
                    <option value="RWF">Rwanda - RWF</option>
                    <option value="USD">USD - $</option>
                </select>
            </div>
        </div>

        <button onclick="convertCurrency()">Convert</button>

        <div class="result-box">
            Result
            <div class="result-value" id="result">0</div>
        </div>

    </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
